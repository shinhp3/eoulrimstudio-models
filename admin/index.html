<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="worker-api-base" content="https://eoulrimstudio-upload.eoulrimstudio.workers.dev" />
  <meta name="viewer-pages-base" content="https://shinhp3.github.io/eoulrimstudio-models" />
  <meta name="github-repo" content="shinhp3/eoulrimstudio-models" />
  <title>STL 업로드 · 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg: #f8f9fb;
  --surface: #ffffff;
  --border: #e2e5ed;
  --text: #111827;
  --muted: #6b7280;
  --accent: #2f6bff;
  --accent-dim: rgba(47, 107, 255, 0.12);
  --danger: #b91c1c;
  --danger-bg: #fef2f2;
  --radius: 12px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: "IBM Plex Sans KR", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
.wrap { max-width: 920px; margin: 0 auto; padding: 24px 20px 56px; }

@media (max-width: 540px) {
  .wrap { padding: 16px 14px 44px; }
  h1 { font-size: 1.25rem; }
  .row-actions { gap: 8px; }
  .row-actions .btn {
    min-height: 44px;
    padding-left: 14px;
    padding-right: 14px;
  }
}
.badge {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 8px;
}
h1 {
  font-size: 1.4rem;
  font-weight: 600;
  margin: 0 0 8px;
  letter-spacing: -0.02em;
}
.lead { margin: 0 0 20px; font-size: 0.9rem; color: var(--muted); max-width: 640px; }
.lead a { color: var(--accent); font-weight: 500; text-decoration: none; }
.lead a:hover { text-decoration: underline; }

.warn-box {
  font-size: 0.82rem;
  color: #92400e;
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 20px;
  line-height: 1.55;
}

.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  background: linear-gradient(160deg, #f0f4ff 0%, #e8edf8 100%);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 16px;
}
.drop-zone:hover, .drop-zone:focus-visible {
  border-color: var(--accent);
  background: var(--accent-dim);
  outline: none;
}
.drop-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.drop-zone strong { display: block; margin-bottom: 6px; font-size: 0.95rem; }
.drop-zone span { font-size: 0.82rem; color: var(--muted); }

.preview-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
}
.preview-panel h2 {
  font-size: 0.95rem;
  font-weight: 600;
  margin: 0 0 10px;
}
.preview-viewport {
  position: relative;
  height: min(28vh, 260px);
  background: linear-gradient(160deg, #f0f4ff 0%, #e8edf8 100%);
  border-radius: 8px;
  overflow: hidden;
}
.preview-canvas-host { width: 100%; height: 100%; }
.preview-hint {
  margin: 8px 0 0;
  font-size: 0.8rem;
  color: var(--muted);
}

.row-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 20px;
}
.btn {
  font: inherit;
  font-size: 0.88rem;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}
.btn-primary:hover:not(:disabled) {
  background: rgba(47, 107, 255, 0.22);
}
.btn-danger {
  border-color: #fecaca;
  background: var(--danger-bg);
  color: var(--danger);
}
.btn-danger:hover:not(:disabled) {
  border-color: var(--danger);
}

.pending-panel {
  background: linear-gradient(165deg, #f0f4ff 0%, #ffffff 38%);
  border: 2px solid rgba(47, 107, 255, 0.45);
  border-radius: var(--radius);
  padding: 18px 18px 16px;
  margin-bottom: 22px;
  box-shadow: 0 6px 24px rgba(47, 107, 255, 0.12), 0 1px 4px rgba(0, 0, 0, 0.06);
}
.pending-panel h2 {
  font-size: 1.08rem;
  font-weight: 700;
  margin: 0 0 10px;
  color: #1e3a8a;
  letter-spacing: -0.02em;
}
.pending-panel-lead {
  margin: 0 0 16px;
  padding: 11px 14px;
  font-size: 0.88rem;
  font-weight: 500;
  color: #1e293b;
  background: rgba(255, 255, 255, 0.85);
  border-radius: 10px;
  border-left: 5px solid var(--accent);
  box-shadow: inset 0 0 0 1px rgba(47, 107, 255, 0.12);
}
.pending-panel-lead code {
  font-size: 0.84em;
  padding: 2px 6px;
  background: #e0e7ff;
  border-radius: 6px;
}
.pending-list { list-style: none; margin: 0; padding: 0; }
.pending-list .pending-item {
  padding: 14px 14px 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
  font-size: 0.88rem;
}
.pending-list .pending-item:last-child { margin-bottom: 0; }
.pending-item-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 4px;
}
.pending-item-titles {
  flex: 1;
  min-width: 0;
}
.pending-remove-btn {
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 0;
  padding: 8px 14px !important;
  font-size: 0.8rem !important;
  font-weight: 600;
  white-space: nowrap;
}
@media (max-width: 380px) {
  .pending-remove-btn {
    padding: 8px 10px !important;
    font-size: 0.76rem !important;
  }
}
.pending-list .fname {
  word-break: break-all;
  font-weight: 600;
  color: var(--text);
  font-size: 0.92rem;
}
.pending-list .fmeta {
  font-size: 0.78rem;
  color: var(--muted);
  flex-shrink: 0;
  margin-top: 4px;
}
.pending-list .slug-field {
  margin-top: 14px;
  padding: 14px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 100%;
  background: linear-gradient(180deg, #eef2ff 0%, #e0e7ff 100%);
  border: 2px solid #818cf8;
  border-radius: 12px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
}
.pending-list .slug-field label {
  font-size: 0.82rem;
  font-weight: 700;
  color: #312e81;
  letter-spacing: -0.01em;
}
.pending-list .slug-field .slug-rule-caption {
  margin: 4px 0 0;
  font-size: 0.72rem;
  font-weight: 600;
  color: #4c1d95;
  opacity: 0.92;
  line-height: 1.35;
}
.slug-input-row {
  width: 100%;
}
/* 인풋 + 업로드를 하나의 흰 필드 안에 배치 */
.slug-input-shell {
  display: flex;
  align-items: stretch;
  width: 100%;
  min-height: 48px;
  background: #fff;
  border: 2px solid #6366f1;
  border-radius: 10px;
  overflow: hidden;
  box-sizing: border-box;
}
.slug-input-shell:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(47, 107, 255, 0.25);
}
.pending-list .slug-input-shell:has(.slug-input--invalid) {
  border-color: #dc2626;
  box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
}
.pending-list .slug-input-shell:has(.slug-input--invalid):focus-within {
  border-color: #dc2626;
  box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2);
}
.pending-list .slug-input-shell .slug-input {
  flex: 1;
  min-width: 0;
  width: auto;
  font: inherit;
  font-size: 1rem;
  font-weight: 600;
  padding: 12px 14px;
  border: none;
  border-radius: 0;
  background: transparent;
  color: #0f172a;
  box-shadow: none !important;
}
.pending-list .slug-input-shell .slug-input:focus {
  outline: none;
}
.pending-list .slug-input-shell .btn-upload-row {
  flex-shrink: 0;
  align-self: stretch;
  margin: 0;
  padding: 12px 16px !important;
  font-size: 0.88rem !important;
  font-weight: 600 !important;
  white-space: nowrap;
  border: none !important;
  border-radius: 0 !important;
  border-left: 1px solid rgba(255, 255, 255, 0.22) !important;
  background: #1e40af !important;
  color: #ffffff !important;
}
.pending-list .slug-input-shell .btn-upload-row:hover:not(:disabled) {
  background: #2563eb !important;
  color: #ffffff !important;
}
.pending-list .slug-input-shell .btn-upload-row:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.slug-invalid-msg {
  display: none;
  margin: 0;
  font-size: 0.78rem;
  font-weight: 600;
  color: #b91c1c;
  line-height: 1.45;
  padding: 8px 10px;
  background: #fef2f2;
  border-radius: 8px;
  border: 1px solid #fecaca;
}
.slug-invalid-msg.slug-invalid-msg--show {
  display: block;
}
.slug-dup-info {
  display: none;
  margin: 0;
  font-size: 0.78rem;
  font-weight: 600;
  color: #92400e;
  line-height: 1.45;
  padding: 8px 10px;
  background: #fffbeb;
  border-radius: 8px;
  border: 1px solid #fcd34d;
}
.slug-dup-info.slug-dup-info--show {
  display: block !important;
  visibility: visible;
}
/* 중복 안내: 슬러그 카드 맨 아래에서 잘 보이도록 */
.pending-list .slug-field .slug-dup-info.slug-dup-info--show {
  margin-top: 6px;
}

/* 덮어쓰기 확인 모달 */
.overwrite-modal {
  position: fixed;
  inset: 0;
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  box-sizing: border-box;
}
.overwrite-modal:not(.overwrite-modal--open) {
  display: none !important;
}
.overwrite-modal.overwrite-modal--open {
  display: flex !important;
}
.overwrite-modal__backdrop {
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.58);
  cursor: pointer;
}
.overwrite-modal__dialog {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  max-height: min(72vh, 520px);
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 24px 48px rgba(15, 23, 42, 0.28);
  overflow: hidden;
}
.overwrite-modal__title {
  margin: 0;
  padding: 20px 22px 8px;
  font-size: 1.12rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.overwrite-modal__lead {
  margin: 0;
  padding: 0 22px 12px;
  font-size: 0.88rem;
  color: var(--muted);
  line-height: 1.45;
}
.overwrite-modal__body {
  padding: 6px 22px 18px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}
.overwrite-modal__item {
  margin: 0 0 12px;
  padding: 12px 14px;
  font-size: 0.88rem;
  line-height: 1.55;
  font-weight: 500;
  color: var(--text);
  background: #fffbeb;
  border: 1px solid #fcd34d;
  border-radius: 10px;
}
.overwrite-modal__item:last-child {
  margin-bottom: 0;
}
.overwrite-modal__item-num {
  font-weight: 700;
  color: #92400e;
  margin-right: 6px;
}
.overwrite-modal__actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-wrap: wrap;
  padding: 16px 22px 18px;
  border-top: 1px solid var(--border);
  background: linear-gradient(180deg, #fafbfc 0%, #fff 100%);
}
.upload-confirm-modal__question {
  margin: 0;
  padding: 4px 22px 8px;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.5;
}
.delete-confirm-modal__target {
  margin: 0;
  padding: 0 22px 14px;
  font-size: 0.86rem;
  font-weight: 500;
  color: var(--muted);
  word-break: break-all;
  line-height: 1.45;
}
.delete-confirm-modal__target code {
  font-size: 0.84em;
  padding: 2px 6px;
  background: var(--bg);
  border-radius: 6px;
  border: 1px solid var(--border);
}
@media (max-width: 480px) {
  .pending-list .slug-input-shell .btn-upload-row {
    padding-left: 12px !important;
    padding-right: 12px !important;
    font-size: 0.85rem !important;
  }
}
.pending-list .slug-input::placeholder {
  color: #94a3b8;
  font-weight: 400;
}
.pending-list .slug-hint {
  font-size: 0.8rem;
  font-weight: 500;
  color: #4338ca;
  line-height: 1.45;
  padding: 8px 10px;
  background: rgba(255, 255, 255, 0.75);
  border-radius: 8px;
  border: 1px solid rgba(99, 102, 241, 0.35);
}
.btn-mini {
  font-size: 0.78rem;
  padding: 4px 10px;
  border-radius: 8px;
}

.result-panel {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 24px;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
}
.result-panel.visible { display: block; }
.result-panel h2 { font-size: 0.95rem; margin: 0 0 12px; }
.result-url {
  display: block;
  word-break: break-all;
  font-size: 0.85rem;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  color: var(--accent);
}
.result-actions { display: flex; flex-wrap: wrap; gap: 8px; }
.msg { font-size: 0.82rem; color: var(--muted); margin-top: 10px; }
.copy-feedback-msg {
  margin: 0 0 14px;
}

.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(248, 249, 251, 0.85);
  align-items: center;
  justify-content: center;
  z-index: 100;
  flex-direction: column;
  gap: 14px;
}
.loading-overlay.visible { display: flex; }
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.95rem; color: var(--muted); }

.remote-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
}
.remote-panel .head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(248, 249, 251, 0.9);
}
.remote-panel h2 { font-size: 0.95rem; margin: 0; }
.fmeta { font-size: 0.82rem; color: var(--muted); }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table.remote-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}
.remote-table th,
.remote-table td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.remote-table td.remote-cell-date {
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  font-size: 0.82rem;
}
.remote-table td.remote-cell-actions {
  vertical-align: middle;
  white-space: nowrap;
}
.remote-cell-actions-row {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.remote-table .btn-icon-remote {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  padding: 0 !important;
  min-width: 36px;
  flex-shrink: 0;
  box-sizing: border-box;
}
.remote-table .btn-icon-remote svg {
  display: block;
  pointer-events: none;
}
.remote-table .btn-copy-remote-url:hover:not(:disabled) svg {
  color: var(--accent);
}
.remote-table .btn-delete-remote {
  flex-shrink: 0;
  white-space: nowrap;
}
.remote-table thead th {
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  background: var(--bg);
}
.remote-table tr:last-child td { border-bottom: none; }
.remote-table td a {
  color: var(--accent);
  text-decoration: none;
  word-break: break-all;
}
.remote-table td a:hover { text-decoration: underline; }
.empty-row td {
  text-align: center;
  color: var(--muted);
  padding: 24px;
}
.err-toast {
  display: none;
  margin-bottom: 16px;
  padding: 12px 14px;
  border-radius: var(--radius);
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: var(--danger);
  font-size: 0.88rem;
}
.err-toast.visible { display: block; }

.publish-callout {
  display: none;
  margin-top: 18px;
  border-radius: 14px;
  overflow: hidden;
  border: 2px solid var(--border);
  box-shadow: 0 8px 28px rgba(15, 23, 42, 0.1);
}
.publish-callout.visible { display: block; }
.publish-callout-head {
  padding: 14px 18px;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.publish-callout-body {
  padding: 14px 18px 18px;
  font-size: 0.93rem;
  line-height: 1.6;
  font-weight: 500;
  white-space: pre-line;
}
.publish-callout--pending {
  border-color: #93c5fd;
  background: #fff;
}
.publish-callout--pending .publish-callout-head {
  background: linear-gradient(90deg, #2563eb 0%, #3b82f6 100%);
  color: #fff;
}
.publish-callout--pending .publish-callout-body {
  background: #eff6ff;
  color: #1e3a8a;
}
.publish-callout--ok {
  border-color: #34d399;
  background: #fff;
}
.publish-callout--ok .publish-callout-head {
  background: linear-gradient(90deg, #059669 0%, #10b981 100%);
  color: #fff;
}
.publish-callout--ok .publish-callout-body {
  background: #ecfdf5;
  color: #064e3b;
  font-weight: 600;
}
.publish-callout--warn {
  border-color: #fbbf24;
  background: #fff;
}
.publish-callout--warn .publish-callout-head {
  background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
  color: #fff;
}
.publish-callout--warn .publish-callout-body {
  background: #fffbeb;
  color: #78350f;
}

@media (max-width: 640px) {
  .remote-panel .table-wrap {
    overflow-x: visible;
  }
  .remote-table thead {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  .remote-table tbody tr {
    display: block;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    padding: 6px 14px 14px;
    background: var(--surface);
    box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
  }
  .remote-table tbody td {
    display: block;
    padding: 12px 0;
    border: none;
    border-bottom: 1px solid var(--border);
    white-space: normal;
    text-align: left;
    vertical-align: initial;
  }
  .remote-table tbody tr td:last-child {
    border-bottom: none;
  }
  .remote-table tbody td::before {
    content: attr(data-label);
    display: block;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .remote-table tbody td.remote-cell-actions {
    padding-top: 14px;
    margin-top: 2px;
    border-top: 1px solid var(--border);
    border-bottom: none;
  }
  .remote-table tbody td.remote-cell-actions::before {

    function normalizeUploadName(name) {
      const lower = String(name).toLowerCase();
      if (!lower.endsWith(".stl")) return null;
      const base = name.slice(0, -4);
      if (!/^[a-zA-Z0-9._-]+$/.test(base)) return null;
      return base + ".stl";
    }

    /** Worker와 동일: 저장 파일명(베이스) 규칙 */
    function isValidSlugBase(base) {
      return /^[a-zA-Z0-9._-]+$/.test(String(base).trim());
    }

    function slugToStlFilename(slugInput) {
      const base = String(slugInput || "")
        .trim()
        .replace(/\.stl$/i, "");
      if (!base || !isValidSlugBase(base)) return null;
      return base + ".stl";
    }

    /** 대소문자 무시 비교용 (대기 중복·원격 덮어쓰기 안내) */
    function stlLowerKey(fn) {
      return String(fn || "").toLowerCase();
    }

    function countPendingWithSameStlName(resolvedFn) {
      const key = stlLowerKey(resolvedFn);
      return pendingFiles.filter((p) => {
        const pf = slugToStlFilename(p.slug);
        return pf && stlLowerKey(pf) === key;
      }).length;
    }

    function remoteHasStlCaseInsensitive(resolvedFn) {
      const key = stlLowerKey(resolvedFn);
      for (const r of remoteStlFilenames) {
        if (stlLowerKey(r) === key) return true;
      }
      return false;
    }

    function remoteFilenameMatchingCaseInsensitive(resolvedFn) {
      const key = stlLowerKey(resolvedFn);
      for (const r of remoteStlFilenames) {
        if (stlLowerKey(r) === key) return r;
      }
      return resolvedFn;
    }

    /** 저장 이름 규칙 안내(Worker·GitHub 경로와 동일) */
    function getSlugValidationIssue(slugInput) {
      const trimmed = String(slugInput ?? "").trim();
      const base = trimmed.replace(/\.stl$/i, "").trim();
      if (!base) {
        return {
          ok: false,
          code: "empty",
          message: "저장 파일명을 입력하세요.",
        };
      }
      const bad = base.match(/[^a-zA-Z0-9._-]/g);
      if (bad) {
        const shown = [...new Set(bad)]
          .map((c) =>
            c === " "
              ? "공백"
              : c === "\t"
                ? "탭"
                : "'" + c + "'"
          )
          .join(", ");
        return {
          ok: false,
          code: "chars",
          message:
            "사용할 수 없는 문자: " +
            shown +
            ". 허용: 영문(A–Z, a–z), 숫자, 마침표(.), 밑줄(_), 하이픈(-)만 가능합니다.",
        };
      }
      return { ok: true };
    }

    /** 업로드 전 확인 문구 수집 */
    function collectOverwriteWarnings(itemsToUpload) {
      const lines = [];
      const seenKey = new Set();
      for (const item of itemsToUpload) {
        const fn = slugToStlFilename(item.slug);
        if (!fn) continue;
        const key = stlLowerKey(fn);
        if (seenKey.has(key)) continue;
        seenKey.add(key);

        const samePending = countPendingWithSameStlName(fn);
        if (samePending > 1) {
          lines.push(
            "저장 이름 \"" +
              fn +
              "\" 이(가) 대기 목록에 " +
              samePending +
              "번 들어 있습니다. 같은 저장소 파일을 차례로 덮어씁니다."
          );
        }
        if (remoteHasStlCaseInsensitive(fn)) {
          const onGit = remoteFilenameMatchingCaseInsensitive(fn);
          lines.push(
            "저장소(models/)에 이미 \"" +
              onGit +
              "\" 파일이 있습니다. 업로드하면 해당 STL이 새 파일로 덮어씌워집니다."
          );
        }
      }
      return lines;
    }

    function showOverwriteModal(warnLines) {

        let settled = false;
        function finish(ok) {
          if (settled) return;
          settled = true;
          root.classList.remove("overwrite-modal--open");
          root.setAttribute("aria-hidden", "true");
          document.body.style.overflow = prevOverflow;
          backdrop.removeEventListener("click", onBackdrop);
          btnCancel.removeEventListener("click", onCancel);
          btnConfirm.removeEventListener("click", onConfirm);
          document.removeEventListener("keydown", onKey);
          resolve(ok);
        }

        function onCancel() {
          finish(false);
        }
        function onConfirm() {
          finish(true);
        }
        function onBackdrop(e) {
          if (e.target === backdrop) finish(false);
        }
        function onKey(e) {
          if (e.key === "Escape") {
            e.preventDefault();
            finish(false);
          }
        }

        backdrop.addEventListener("click", onBackdrop);
        btnCancel.addEventListener("click", onCancel);
        btnConfirm.addEventListener("click", onConfirm);
        document.addEventListener("keydown", onKey);

        queueMicrotask(() => {
          try {

      });
    }

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      const chunk = 0x8000;
      let binary = "";
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(binary);
    }

    function disposePreviewMesh() {
      if (preview.mesh) {
        preview.scene.remove(preview.mesh);
        preview.mesh.geometry?.dispose();
        preview.mesh.material?.dispose();
        preview.mesh = undefined;
      }
    }

    function stopPreviewLoop() {
      if (preview._raf) {
        cancelAnimationFrame(preview._raf);
        preview._raf = null;
      }
      if (preview._onResize) {
        window.removeEventListener("resize", preview._onResize);
        preview._onResize = null;
      }
    }

    function destroyPreviewGl() {
      stopPreviewLoop();
      disposePreviewMesh();
      if (preview.renderer) {
        preview.renderer.dispose();
        const el = preview.renderer.domElement;
        if (el && el.parentNode) el.parentNode.removeChild(el);
        preview.renderer = null;
      }
      preview.scene = null;
      preview.camera = null;
      preview.hemiLight = null;
      preview.dirLight = null;
    }

    function setupPreviewDrag() {
      const el = preview.renderer.domElement;
      let dragging = false;
      let lastX = 0;
      let lastY = 0;
      const SPEED = 0.008;

      function applyDelta(dx, dy) {
        if (!preview.mesh) return;
        const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), dx * SPEED);
        const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), dy * SPEED);
        preview.mesh.quaternion.premultiply(qY).premultiply(qX);
      }

      function applyZoom(factor) {
        const minDist = 0.5;
        const maxDist = 10000;
        const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(preview.camera.quaternion);
        const dist = preview.camera.position.length();
        preview.camera.position.addScaledVector(dir, dist * (1 - factor));
        const newDist = preview.camera.position.length();
        if (newDist < minDist) preview.camera.position.setLength(minDist);
        if (newDist > maxDist) preview.camera.position.setLength(maxDist);
      }

      el.addEventListener("mousedown", (e) => {
        if (e.button !== 0) return;
        dragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        el.style.cursor = "grabbing";
      });
      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        applyDelta(e.clientX - lastX, e.clientY - lastY);
        lastX = e.clientX;
        lastY = e.clientY;
      });
      window.addEventListener("mouseup", () => {
        dragging = false;
        el.style.cursor = "grab";
      });
      el.style.cursor = "grab";

      el.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          applyZoom(e.deltaY > 0 ? 1.12 : 1 / 1.12);
        },
        { passive: false }
      );

      let lastTouchX = 0;
      let lastTouchY = 0;
      let lastPinchDist = 0;
      el.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          if (e.touches.length === 1) {
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
            lastPinchDist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
          }
        },
        { passive: false }
      );
      el.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          if (e.touches.length === 1) {
            applyDelta(e.touches[0].clientX - lastTouchX, e.touches[0].clientY - lastTouchY);
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
            const dist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
            if (lastPinchDist > 0) applyZoom(lastPinchDist / dist);
            lastPinchDist = dist;
          }
        },
        { passive: false }
      );
      el.addEventListener("touchend", () => {
        lastPinchDist = 0;
      }, { passive: true });
    }

    function resizePreview() {
      if (!preview.renderer || !preview.camera || !previewHost) return;
      const w = Math.max(previewHost.clientWidth, 2);
      const h = Math.max(previewHost.clientHeight, 2);
      preview.camera.aspect = w / h;
      preview.camera.updateProjectionMatrix();
      preview.renderer.setSize(w, h);
    }

    function fitCameraToMesh(mesh) {
      const box = new THREE.Box3().setFromObject(mesh);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z, 1);
      const dist = maxDim * 2.0;
      preview.camera.near = Math.max(0.01, dist / 200);
      preview.camera.far = dist * 50;
      preview.camera.updateProjectionMatrix();
      preview.initialCameraPos = new THREE.Vector3(0, 0, dist);
      preview.camera.position.copy(preview.initialCameraPos);
      preview.camera.lookAt(0, 0, 0);
    }

    async function ensurePreviewGl() {
      if (preview.renderer && preview.scene) return;
      destroyPreviewGl();
      const host = previewHost;
      const w = Math.max(host.clientWidth, 2);
      const h = Math.max(host.clientHeight, 2);
      preview.scene = new THREE.Scene();
      preview.scene.background = new THREE.Color(0xf0f4ff);
      preview.camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 2000);
      preview.camera.position.set(0, 0, 120);
      preview.camera.lookAt(0, 0, 0);
      preview.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      preview.renderer.setSize(w, h);
      preview.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      host.appendChild(preview.renderer.domElement);

      preview.hemiLight = new THREE.HemisphereLight(0xffffff, 0xdde4f0, 0.25);
      preview.scene.add(preview.hemiLight);
      preview.dirLight = new THREE.DirectionalLight(0xffffff, 1.15);
      preview.scene.add(preview.dirLight.target);
      preview.dirLight.target.position.set(0, 0, 0);
      preview.scene.add(preview.dirLight);
      preview.dirLight.position.set(55, 95, 70);

      setupPreviewDrag();

      function loop() {
        preview._raf = requestAnimationFrame(loop);
        preview.renderer.render(preview.scene, preview.camera);
      }
      loop();

      preview._onResize = resizePreview;
      window.addEventListener("resize", preview._onResize);
      requestAnimationFrame(resizePreview);
    }

    async function loadPreviewFromFirstPending() {
      const first = pendingFiles[0];
      if (!first || !normalizeUploadName(first.file.name)) {
        destroyPreviewGl();
        return;
      }
      await ensurePreviewGl();
      const buf = await first.file.arrayBuffer();
      const loader = new STLLoader();
      const geometry = loader.parse(buf);
      geometry.computeVertexNormals();
      geometry.center();
      disposePreviewMesh();
      const mat = new THREE.MeshStandardMaterial({
        color: 0xa3f958,
        metalness: 0.05,
        roughness: 0.55,
      });
      preview.mesh = new THREE.Mesh(geometry, mat);
      preview.scene.add(preview.mesh);
      fitCameraToMesh(preview.mesh);
    }

    async function uploadStlFile(item) {
      const safeName = slugToStlFilename(item.slug);
      if (!safeName) {
        throw new Error(
          "저장 이름이 올바르지 않습니다. 영문·숫자·._- 만 사용하고 확장자는 생략해도 됩니다: " +
            item.slug
        );
      }
      if (!normalizeUploadName(item.file.name)) {
        throw new Error("원본은 .stl 이고 파일명 규칙을 만족해야 합니다: " + item.file.name);
      }
      const buf = await item.file.arrayBuffer();
      const content = arrayBufferToBase64(buf);

      const res = await fetch(workerEndpoint("/upload"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename: safeName, content }),
      });

      let data;
      try {
        data = await res.json();
      } catch {
        throw new Error("응답을 해석할 수 없습니다 (HTTP " + res.status + ")");
      }

      if (!res.ok || data.success === false) {
        throw new Error(data.error || "업로드 실패 (HTTP " + res.status + ")");
      }
      const url =
        data.url ||
        publicViewerUrlForFilename(data.filename || safeName);
      return {
        url,
        filename: data.filename || safeName,
        metaWarning:
          typeof data.metaWarning === "string" && data.metaWarning.trim()
            ? data.metaWarning.trim()
            : null,
      };
    }

    function formatUploadedAt(iso) {
      if (!iso || typeof iso !== "string") return "—";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "—";
      return d.toLocaleString("ko-KR", {
        dateStyle: "short",
        timeStyle: "short",
      });
    }

    async function uploadPendingSubset(itemsToUpload) {
      clearError();
      if (!itemsToUpload.length) return;

      const resolvedNames = [];
      for (const item of itemsToUpload) {
        const fn = slugToStlFilename(item.slug);
        if (!fn) {
          const v = getSlugValidationIssue(item.slug);
          showError(v.ok ? "저장 이름을 확인해 주세요." : v.message);
          return;
        }
        resolvedNames.push(fn);
      }
      if (new Set(resolvedNames).size !== resolvedNames.length) {
        showError("한 번에 올리는 항목에 같은 저장 이름이 둘 이상 있습니다.");
        return;
      }

      const okUpload = await showUploadConfirmModal();
      if (!okUpload) return;

      const warns = collectOverwriteWarnings(itemsToUpload);
      if (warns.length > 0) {
        const ok = await showOverwriteModal(warns);
        if (!ok) return;
      }

      let lastUrl = "";
      const metaWarnings = [];
      try {
        for (let i = 0; i < itemsToUpload.length; i++) {
          setLoading(
            true,
            "업로드 중… (" + (i + 1) + "/" + itemsToUpload.length + ")"
          );
          const out = await uploadStlFile(itemsToUpload[i]);
          lastUrl = out.url;
          if (out.metaWarning) metaWarnings.push(out.metaWarning);
        }
        showResult(lastUrl);
        if (metaWarnings.length) {
          showError(
            "STL은 업로드되었으나 업로드 시각 저장(meta.json)에 실패했습니다: " +
              [...new Set(metaWarnings)].join(" · ")
          );
        }
        const uploadedSet = new Set(itemsToUpload);
        pendingFiles = pendingFiles.filter((x) => !uploadedSet.has(x));
        renderPending();
        await refreshRemoteList();
        waitForModelsOnPages(resolvedNames).catch((e) => console.error(e));
      } catch (e) {
        console.error(e);
        showError(e.message || String(e));
      } finally {
        setLoading(false);
      }
    }

      if (n < 1024) return n + " B";

    }

    function modelOnPagesUrl(stlFilename) {
      const base = PUBLIC_VIEWER_BASE.replace(/\/$/, "");
      return base + "/models/" + encodeURIComponent(stlFilename);
    }

    async function isModelReachableOnPages(stlFilename) {
      const url = modelOnPagesUrl(stlFilename) + "?_poll=" + Date.now();
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 12000);
      try {
        let res = await fetch(url, { method: "HEAD", cache: "no-store", signal: ctrl.signal });
        if (res.ok) return true;
        res = await fetch(url, {
          method: "GET",
          cache: "no-store",
          headers: { Range: "bytes=0-31" },
          signal: ctrl.signal,
        });
        return res.ok || res.status === 206;
      } catch {
        return false;
      } finally {
        clearTimeout(tid);
      }
    }

    async function waitForModelsOnPages(stlFilenames) {
      if (!stlFilenames.length) return;
      publishStatusEl.hidden = false;
      publishStatusEl.classList.add("visible", "publish-callout--pending");
      publishStatusEl.classList.remove("publish-callout--ok", "publish-callout--warn");

      const pending = new Set(stlFilenames);
      const total = stlFilenames.length;
      let attempt = 0;
      const maxAttempts = 48;

      while (pending.size > 0 && attempt < maxAttempts) {
        attempt += 1;
        const done = total - pending.size;
        publishStatusHead.textContent = "사이트 반영 확인 중";
        publishStatusBody.textContent =
          "GitHub Pages에 STL이 보이는지 확인하고 있습니다. (" +
          done +
          "/" +
          total +
          " 파일 확인됨 · 시도 " +
          attempt +
          "/" +
          maxAttempts +
          ")\n\n최대 약 1~2분 걸릴 수 있습니다. 완료되면 여기 초록색으로 바뀝니다.";

        for (const name of [...pending]) {
          if (await isModelReachableOnPages(name)) pending.delete(name);
        }

        if (pending.size === 0) {
          publishStatusEl.classList.remove("publish-callout--pending");
          publishStatusEl.classList.add("publish-callout--ok");
          publishStatusHead.textContent = "반영 완료";
          publishStatusBody.textContent =
            "위 뷰어 링크로 모델을 열 수 있는 상태로 보입니다. 화면이 비면 링크를 한 번 더 누르거나 새로고침해 보세요.";
          return;
        }

        const delay = Math.min(600 + attempt * 100, 2800);
        await new Promise((r) => setTimeout(r, delay));
      }

      publishStatusEl.classList.remove("publish-callout--pending");
      publishStatusEl.classList.add("publish-callout--warn");
      const left = [...pending].join(", ");
      publishStatusHead.textContent = "아직 확인되지 않음";
      publishStatusBody.textContent =
        "다음 파일을 Pages에서 아직 찾지 못했습니다: " +
        left +
        "\n\nGitHub·Pages 배포 지연 또는 캐시일 수 있습니다. 잠시 후 뷰어 링크를 다시 열어 보세요.";
    }

    function addFilesFromList(fileList) {
      const incoming = Array.from(fileList || []).filter((f) =>
        f.name.toLowerCase().endsWith(".stl")
      );
      if (incoming.length === 0 && fileList && fileList.length > 0) {
        showError("STL 파일(.stl)만 추가할 수 있습니다.");
        return;
      }
      clearError();
      const names = new Set(pendingFiles.map((x) => x.file.name));
      for (const f of incoming) {
        if (names.has(f.name)) continue;
        const normalized = normalizeUploadName(f.name);
        if (!normalized) {
          showError(
            "원본 파일명 규칙에 맞지 않습니다(영문·숫자·._- 만): " + f.name + " — 다른 이름으로 저장한 뒤 다시 추가하세요."
          );
          continue;
        }
        const slug = normalized.slice(0, -4);
        pendingFiles.push({ file: f, slug });
        names.add(f.name);
      }
      renderPending();
    }

    async function refreshRemoteList() {
      remoteMeta.textContent = "";
      remoteTbody.innerHTML =
        '<tr class="empty-row"><td colspan="4">불러오는 중…</td></tr>';
      try {
        clearError();
        const res = await fetch(workerEndpoint("/list"), {
          method: "GET",
        });
        let data;
        try {
          data = await res.json();
        } catch {
          throw new Error("목록 응답을 해석할 수 없습니다 (HTTP " + res.status + ")");
        }

        if (!res.ok && data.success === false) {
          throw new Error(data.error || "목록 조회 실패 (HTTP " + res.status + ")");
        }
        if (!res.ok) {
          throw new Error(data.error || "HTTP " + res.status);
        }

        if (data.success === false && data.error) {
          throw new Error(data.error);
        }

        const files = Array.isArray(data.files) ? data.files : [];
        remoteStlFilenames = new Set(
          files.map((f) => f.filename).filter(Boolean)
        );
        remoteMeta.textContent = files.length + "개";
        if (files.length === 0) {
          remoteStlFilenames = new Set();
          remoteTbody.innerHTML =
            '<tr class="empty-row"><td colspan="4">models/ 에 STL이 없습니다.</td></tr>';
          return;
        }

        remoteTbody.innerHTML = "";
        for (const item of files) {
          const name = item.filename || "";
          const url =
            item.url || publicViewerUrlForFilename(name);
          const tr = document.createElement("tr");
          const tdName = document.createElement("td");
          tdName.dataset.label = "파일";
          tdName.textContent = name;
          const tdWhen = document.createElement("td");
          tdWhen.dataset.label = "업로드 시각";
          tdWhen.className = "remote-cell-date";
          tdWhen.textContent = formatUploadedAt(item.uploadedAt);
          const tdLink = document.createElement("td");
          tdLink.dataset.label = "뷰어 링크";
          const a = document.createElement("a");
          a.href = url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = url;
          tdLink.appendChild(a);
          const tdAct = document.createElement("td");
          tdAct.dataset.label = "작업";
          tdAct.className = "remote-cell-actions";
          const actionsRow = document.createElement("div");
          actionsRow.className = "remote-cell-actions-row";
          const iconCopy =
            '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
          const iconTrash =
            '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';
          const copyBtn = document.createElement("button");
          copyBtn.type = "button";
          copyBtn.className = "btn btn-mini btn-icon-remote btn-copy-remote-url";
          copyBtn.setAttribute("aria-label", "뷰어 URL 복사");
          copyBtn.title = "URL 복사";
          copyBtn.innerHTML = iconCopy;
          copyBtn.addEventListener("click", () => copyTextWithFeedback(url));
          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "btn btn-mini btn-danger btn-icon-remote btn-delete-remote";
          delBtn.setAttribute("aria-label", "파일 삭제");
          delBtn.title = "삭제";
          delBtn.innerHTML = iconTrash;
          delBtn.addEventListener("click", () => deleteRemoteFile(name));
          actionsRow.appendChild(copyBtn);
          actionsRow.appendChild(delBtn);
          tdAct.appendChild(actionsRow);
          tr.appendChild(tdName);
          tr.appendChild(tdWhen);
          tr.appendChild(tdLink);
          tr.appendChild(tdAct);
          remoteTbody.appendChild(tr);
        }
      } catch (e) {
        remoteStlFilenames = new Set();
        remoteTbody.innerHTML =
          '<tr class="empty-row"><td colspan="4">목록을 불러오지 못했습니다.</td></tr>';
        remoteMeta.textContent = "";
        showError(e.message || String(e));
      }
    }

    btnRefreshList.addEventListener("click", () =>
      refreshRemoteList().catch(() => {})
    );

    refreshRemoteList().catch(() => {});
  </script>
</body>
</html>
