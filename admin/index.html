<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="worker-api-base" content="https://eoulrimstudio-upload.eoulrimstudio.workers.dev" />
  <meta name="viewer-pages-base" content="https://shinhp3.github.io/eoulrimstudio-models" />
  <meta name="github-repo" content="shinhp3/eoulrimstudio-models" />
  <title>STL 업로드 · 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg: #f8f9fb;
  --surface: #ffffff;
  --border: #e2e5ed;
  --text: #111827;
  --muted: #6b7280;
  --accent: #2f6bff;
  --accent-dim: rgba(47, 107, 255, 0.12);
  --danger: #b91c1c;
  --danger-bg: #fef2f2;
  --radius: 12px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: "IBM Plex Sans KR", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
.wrap { max-width: 920px; margin: 0 auto; padding: 24px 20px 56px; }

@media (max-width: 540px) {
  .wrap { padding: 16px 14px 44px; }
  h1 { font-size: 1.25rem; }
  .row-actions { gap: 8px; }
  .row-actions .btn {
    min-height: 44px;
    padding-left: 14px;
    padding-right: 14px;
  }
}
.badge {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 8px;
}
h1 {
  font-size: 1.4rem;
  font-weight: 600;
  margin: 0 0 8px;
  letter-spacing: -0.02em;
}
.lead { margin: 0 0 20px; font-size: 0.9rem; color: var(--muted); max-width: 640px; }
.lead a { color: var(--accent); font-weight: 500; text-decoration: none; }
.lead a:hover { text-decoration: underline; }

.warn-box {
  font-size: 0.82rem;
  color: #92400e;
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 20px;
  line-height: 1.55;
}

.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  background: linear-gradient(160deg, #f0f4ff 0%, #e8edf8 100%);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 16px;
}
.drop-zone:hover, .drop-zone:focus-visible {
  border-color: var(--accent);
  background: var(--accent-dim);
  outline: none;
}
.drop-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.drop-zone strong { display: block; margin-bottom: 6px; font-size: 0.95rem; }
.drop-zone span { font-size: 0.82rem; color: var(--muted); }

.preview-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
}
.preview-panel h2 {
  font-size: 0.95rem;
  font-weight: 600;
  margin: 0 0 10px;
}
.preview-viewport {
  position: relative;
  height: min(28vh, 260px);
  background: linear-gradient(160deg, #f0f4ff 0%, #e8edf8 100%);
  border-radius: 8px;
  overflow: hidden;
}
.preview-canvas-host { width: 100%; height: 100%; }
.preview-hint {
  margin: 8px 0 0;
  font-size: 0.8rem;
  color: var(--muted);
}

.row-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 20px;
}
.btn {
  font: inherit;
  font-size: 0.88rem;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}
.btn-primary:hover:not(:disabled) {
  background: rgba(47, 107, 255, 0.22);
}
.btn-danger {
  border-color: #fecaca;
  background: var(--danger-bg);
  color: var(--danger);
}
.btn-danger:hover:not(:disabled) {
  border-color: var(--danger);
}

.pending-panel {
  background: linear-gradient(165deg, #f0f4ff 0%, #ffffff 38%);
  border: 2px solid rgba(47, 107, 255, 0.45);
  border-radius: var(--radius);
  padding: 18px 18px 16px;
  margin-bottom: 22px;
  box-shadow: 0 6px 24px rgba(47, 107, 255, 0.12), 0 1px 4px rgba(0, 0, 0, 0.06);
}
.pending-panel h2 {
  font-size: 1.08rem;
  font-weight: 700;
  margin: 0 0 10px;
  color: #1e3a8a;
  letter-spacing: -0.02em;
}
.pending-panel-lead {
  margin: 0 0 16px;
  padding: 11px 14px;
  font-size: 0.88rem;
  font-weight: 500;
  color: #1e293b;
  background: rgba(255, 255, 255, 0.85);
  border-radius: 10px;
  border-left: 5px solid var(--accent);
  box-shadow: inset 0 0 0 1px rgba(47, 107, 255, 0.12);
}
.pending-panel-lead code {
  font-size: 0.84em;
  padding: 2px 6px;
  background: #e0e7ff;
  border-radius: 6px;
}
.pending-list { list-style: none; margin: 0; padding: 0; }
.pending-list .pending-item {
  padding: 14px 14px 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
  font-size: 0.88rem;
}
.pending-list .pending-item:last-child { margin-bottom: 0; }
.pending-item-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 4px;
}
.pending-item-titles {
  flex: 1;
  min-width: 0;
}
.pending-remove-btn {
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 0;
  padding: 8px 14px !important;
  font-size: 0.8rem !important;
  font-weight: 600;
  white-space: nowrap;
}
@media (max-width: 380px) {
  .pending-remove-btn {
    padding: 8px 10px !important;
    font-size: 0.76rem !important;
  }
}
.pending-list .fname {
  word-break: break-all;
  font-weight: 600;
  color: var(--text);
  font-size: 0.92rem;
}
.pending-list .fmeta {
  font-size: 0.78rem;
  color: var(--muted);
  flex-shrink: 0;
  margin-top: 4px;
}
.pending-list .slug-field {
  margin-top: 14px;
  padding: 14px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 100%;
  background: linear-gradient(180deg, #eef2ff 0%, #e0e7ff 100%);
  border: 2px solid #818cf8;
  border-radius: 12px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
}
.pending-list .slug-field label {
  font-size: 0.82rem;
  font-weight: 700;
  color: #312e81;
  letter-spacing: -0.01em;
}
.pending-list .slug-input {
  font: inherit;
  font-size: 1rem;
  font-weight: 600;
  padding: 12px 14px;
  border: 2px solid #6366f1;
  border-radius: 10px;
  width: 100%;
  background: #fff;
  color: #0f172a;
}
.pending-list .slug-input::placeholder {
  color: #94a3b8;
  font-weight: 400;
}
.pending-list .slug-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(47, 107, 255, 0.25);
}
.pending-list .slug-hint {
  font-size: 0.8rem;
  font-weight: 500;
  color: #4338ca;
  line-height: 1.45;
  padding: 8px 10px;
  background: rgba(255, 255, 255, 0.75);
  border-radius: 8px;
  border: 1px solid rgba(99, 102, 241, 0.35);
}
.btn-mini {
  font-size: 0.78rem;
  padding: 4px 10px;
  border-radius: 8px;
}

.result-panel {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 24px;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
}
.result-panel.visible { display: block; }
.result-panel h2 { font-size: 0.95rem; margin: 0 0 12px; }
.result-url {
  display: block;
  word-break: break-all;
  font-size: 0.85rem;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  color: var(--accent);
}
.result-actions { display: flex; flex-wrap: wrap; gap: 8px; }
.msg { font-size: 0.82rem; color: var(--muted); margin-top: 10px; }

.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(248, 249, 251, 0.85);
  align-items: center;
  justify-content: center;
  z-index: 100;
  flex-direction: column;
  gap: 14px;
}
.loading-overlay.visible { display: flex; }
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.95rem; color: var(--muted); }

.remote-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
}
.remote-panel .head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(248, 249, 251, 0.9);
}
.remote-panel h2 { font-size: 0.95rem; margin: 0; }
.fmeta { font-size: 0.82rem; color: var(--muted); }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table.remote-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}
.remote-table th,
.remote-table td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.remote-table td.remote-cell-actions {
  vertical-align: middle;
  white-space: nowrap;
}
.remote-table .btn-delete-remote {
  min-width: 4.25rem;
  flex-shrink: 0;
  white-space: nowrap;
  padding: 8px 14px !important;
  font-weight: 600;
}
.remote-table thead th {
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  background: var(--bg);
}
.remote-table tr:last-child td { border-bottom: none; }
.remote-table td a {
  color: var(--accent);
  text-decoration: none;
  word-break: break-all;
}
.remote-table td a:hover { text-decoration: underline; }
.empty-row td {
  text-align: center;
  color: var(--muted);
  padding: 24px;
}
.err-toast {
  display: none;
  margin-bottom: 16px;
  padding: 12px 14px;
  border-radius: var(--radius);
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: var(--danger);
  font-size: 0.88rem;
}
.err-toast.visible { display: block; }

.publish-callout {
  display: none;
  margin-top: 18px;
  border-radius: 14px;
  overflow: hidden;
  border: 2px solid var(--border);
  box-shadow: 0 8px 28px rgba(15, 23, 42, 0.1);
}
.publish-callout.visible { display: block; }
.publish-callout-head {
  padding: 14px 18px;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.publish-callout-body {
  padding: 14px 18px 18px;
  font-size: 0.93rem;
  line-height: 1.6;
  font-weight: 500;
  white-space: pre-line;
}
.publish-callout--pending {
  border-color: #93c5fd;
  background: #fff;
}
.publish-callout--pending .publish-callout-head {
  background: linear-gradient(90deg, #2563eb 0%, #3b82f6 100%);
  color: #fff;
}
.publish-callout--pending .publish-callout-body {
  background: #eff6ff;
  color: #1e3a8a;
}
.publish-callout--ok {
  border-color: #34d399;
  background: #fff;
}
.publish-callout--ok .publish-callout-head {
  background: linear-gradient(90deg, #059669 0%, #10b981 100%);
  color: #fff;
}
.publish-callout--ok .publish-callout-body {
  background: #ecfdf5;
  color: #064e3b;
  font-weight: 600;
}
.publish-callout--warn {
  border-color: #fbbf24;
  background: #fff;
}
.publish-callout--warn .publish-callout-head {
  background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
  color: #fff;
}
.publish-callout--warn .publish-callout-body {
  background: #fffbeb;
  color: #78350f;
}

@media (max-width: 640px) {
  .remote-panel .table-wrap {
    overflow-x: visible;
  }
  .remote-table thead {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  .remote-table tbody tr {
    display: block;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    padding: 6px 14px 14px;
    background: var(--surface);
    box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
  }
  .remote-table tbody td {
    display: block;
    padding: 12px 0;
    border: none;
    border-bottom: 1px solid var(--border);
    white-space: normal;
    text-align: left;
    vertical-align: initial;
  }
  .remote-table tbody tr td:last-child {
    border-bottom: none;
  }
  .remote-table tbody td::before {
    content: attr(data-label);
    display: block;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .remote-table tbody td.remote-cell-actions {
    padding-top: 14px;
    margin-top: 2px;
    border-top: 1px solid var(--border);
    border-bottom: none;
  }
  .remote-table tbody td.remote-cell-actions::before {
    margin-bottom: 10px;
  }
  .remote-table .btn-delete-remote {
    display: block;
    width: 100%;
    max-width: none;
    min-height: 44px;
    box-sizing: border-box;
    padding: 12px 16px !important;
    font-size: 0.9rem !important;
  }
  .remote-table .empty-row td {
    border: none;
    padding: 20px;
  }
  .remote-table .empty-row td::before {
    display: none;
    content: none;
  }
  .publish-callout-head {
    padding: 12px 14px;
    font-size: 0.92rem;
  }
  .publish-callout-body {
    padding: 12px 14px 16px;
    font-size: 0.88rem;
  }
}
  </style>
</head>
<body>
  <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
    <div class="spinner" role="status"></div>
    <p id="loading-text" class="loading-text">업로드 중…</p>
  </div>

  <div class="wrap">
    <h1>STL 업로드 · 관리자용</h1>

    <div id="err-toast" class="err-toast" role="alert"></div>

    <div
      id="drop-zone"
      class="drop-zone"
      tabindex="0"
      role="button"
      aria-label="STL 파일을 여기에 놓거나 클릭하여 선택"
    >
      <strong>STL을 여기에 드롭</strong>
      <span>또는 클릭하여 선택 (.stl)</span>
    </div>
    <input type="file" id="file-input" accept=".stl,.STL" multiple hidden />

    <div id="preview-panel" class="preview-panel">
      <h2>3D 미리보기</h2>
      <div class="preview-viewport">
        <div id="preview-canvas-host" class="preview-canvas-host"></div>
      </div>
    </div>

    <div class="row-actions">
      <button type="button" id="btn-upload" class="btn btn-primary" disabled>업로드</button>
      <button type="button" id="btn-clear-pending" class="btn" disabled>대기 목록 비우기</button>
      <button type="button" id="btn-refresh-list" class="btn">목록 새로고침</button>
    </div>

    <div id="pending-panel" class="pending-panel" hidden>
      <h2>업로드 대기</h2>
      
      <ul id="pending-list" class="pending-list"></ul>
    </div>

    <div id="result-panel" class="result-panel">
      <h2>마지막 업로드 링크</h2>
      <a id="result-url" class="result-url" href="#" target="_blank" rel="noopener"></a>
      <div class="result-actions">
        <button type="button" id="btn-copy-url" class="btn btn-primary">링크 복사</button>
        <button type="button" id="btn-kakao-share" class="btn">공유</button>
      </div>
      <p id="copy-msg" class="msg" hidden>클립보드에 복사했습니다.</p>
      <div id="publish-status" class="publish-callout" hidden aria-live="polite">
        <div id="publish-status-head" class="publish-callout-head"></div>
        <div id="publish-status-body" class="publish-callout-body"></div>
      </div>
    </div>

    <div class="remote-panel">
      <div class="head">
        <h2>저장소의 models/ 파일</h2>
        <span id="remote-meta" class="fmeta"></span>
      </div>
      <div class="table-wrap">
        <table class="remote-table">
          <thead>
            <tr>
              <th>파일</th>
              <th>뷰어 링크</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody id="remote-tbody">
            <tr class="empty-row"><td colspan="3">목록을 불러오는 중…</td></tr>
          </tbody>
        </table>
      </div>
      <p style="padding:12px 16px;font-size:0.82rem;color:var(--muted);margin:0;border-top:1px solid var(--border)">
        <a id="link-repo-root" href="#">GitHub에서 models 폴더 열기</a>
      </p>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { STLLoader } from "three/addons/loaders/STLLoader.js";

    function readMeta(name, fallback) {
      const el = document.querySelector(`meta[name="${name}"]`);
      const v = el && el.content && String(el.content).trim();
      return v || fallback;
    }

    const WORKER_API_BASE = readMeta(
      "worker-api-base",
      "https://eoulrimstudio-upload.eoulrimstudio.workers.dev"
    ).replace(/\/$/, "");

    const PUBLIC_VIEWER_BASE = readMeta(
      "viewer-pages-base",
      "https://shinhp3.github.io/eoulrimstudio-models"
    ).replace(/\/$/, "");

    function workerEndpoint(path) {
      const p = path.startsWith("/") ? path : "/" + path;
      return WORKER_API_BASE + p;
    }

    function publicViewerUrlForFilename(filename) {
      const base = String(filename).replace(/\.stl$/i, "").trim();
      return PUBLIC_VIEWER_BASE + "/?model=" + encodeURIComponent(base);
    }

    const ghRepo = readMeta("github-repo", "shinhp3/eoulrimstudio-models");
    document.getElementById("link-repo-root").href =
      "https://github.com/" + ghRepo.trim() + "/tree/HEAD/models";

    /** @type {{ file: File, slug: string }[]} */
    let pendingFiles = [];
    let lastViewerUrl = "";

    let preview = {
      scene: null,
      camera: null,
      renderer: null,
      mesh: null,
      hemiLight: null,
      dirLight: null,
      _raf: null,
      _onResize: null,
      initialCameraPos: null,
    };

    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");
    const btnUpload = document.getElementById("btn-upload");
    const btnClearPending = document.getElementById("btn-clear-pending");
    const btnRefreshList = document.getElementById("btn-refresh-list");
    const pendingPanel = document.getElementById("pending-panel");
    const pendingList = document.getElementById("pending-list");
    const loadingOverlay = document.getElementById("loading-overlay");
    const loadingText = document.getElementById("loading-text");
    const resultPanel = document.getElementById("result-panel");
    const resultUrlEl = document.getElementById("result-url");
    const btnCopyUrl = document.getElementById("btn-copy-url");
    const btnKakaoShare = document.getElementById("btn-kakao-share");
    const copyMsg = document.getElementById("copy-msg");
    const remoteTbody = document.getElementById("remote-tbody");
    const remoteMeta = document.getElementById("remote-meta");
    const errToast = document.getElementById("err-toast");
    const previewHost = document.getElementById("preview-canvas-host");
    const publishStatusEl = document.getElementById("publish-status");
    const publishStatusHead = document.getElementById("publish-status-head");
    const publishStatusBody = document.getElementById("publish-status-body");

    function showError(msg) {
      errToast.textContent = msg;
      errToast.classList.add("visible");
    }
    function clearError() {
      errToast.textContent = "";
      errToast.classList.remove("visible");
    }

    function normalizeUploadName(name) {
      const lower = String(name).toLowerCase();
      if (!lower.endsWith(".stl")) return null;
      const base = name.slice(0, -4);
      if (!/^[a-zA-Z0-9._-]+$/.test(base)) return null;
      return base + ".stl";
    }

    /** Worker와 동일: 저장 파일명(베이스) 규칙 */
    function isValidSlugBase(base) {
      return /^[a-zA-Z0-9._-]+$/.test(String(base).trim());
    }

    function slugToStlFilename(slugInput) {
      const base = String(slugInput || "")
        .trim()
        .replace(/\.stl$/i, "");
      if (!base || !isValidSlugBase(base)) return null;
      return base + ".stl";
    }

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      const chunk = 0x8000;
      let binary = "";
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(binary);
    }

    function disposePreviewMesh() {
      if (preview.mesh) {
        preview.scene.remove(preview.mesh);
        preview.mesh.geometry?.dispose();
        preview.mesh.material?.dispose();
        preview.mesh = undefined;
      }
    }

    function stopPreviewLoop() {
      if (preview._raf) {
        cancelAnimationFrame(preview._raf);
        preview._raf = null;
      }
      if (preview._onResize) {
        window.removeEventListener("resize", preview._onResize);
        preview._onResize = null;
      }
    }

    function destroyPreviewGl() {
      stopPreviewLoop();
      disposePreviewMesh();
      if (preview.renderer) {
        preview.renderer.dispose();
        const el = preview.renderer.domElement;
        if (el && el.parentNode) el.parentNode.removeChild(el);
        preview.renderer = null;
      }
      preview.scene = null;
      preview.camera = null;
      preview.hemiLight = null;
      preview.dirLight = null;
    }

    function setupPreviewDrag() {
      const el = preview.renderer.domElement;
      let dragging = false;
      let lastX = 0;
      let lastY = 0;
      const SPEED = 0.008;

      function applyDelta(dx, dy) {
        if (!preview.mesh) return;
        const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), dx * SPEED);
        const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), dy * SPEED);
        preview.mesh.quaternion.premultiply(qY).premultiply(qX);
      }

      function applyZoom(factor) {
        const minDist = 0.5;
        const maxDist = 10000;
        const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(preview.camera.quaternion);
        const dist = preview.camera.position.length();
        preview.camera.position.addScaledVector(dir, dist * (1 - factor));
        const newDist = preview.camera.position.length();
        if (newDist < minDist) preview.camera.position.setLength(minDist);
        if (newDist > maxDist) preview.camera.position.setLength(maxDist);
      }

      el.addEventListener("mousedown", (e) => {
        if (e.button !== 0) return;
        dragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        el.style.cursor = "grabbing";
      });
      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        applyDelta(e.clientX - lastX, e.clientY - lastY);
        lastX = e.clientX;
        lastY = e.clientY;
      });
      window.addEventListener("mouseup", () => {
        dragging = false;
        el.style.cursor = "grab";
      });
      el.style.cursor = "grab";

      el.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          applyZoom(e.deltaY > 0 ? 1.12 : 1 / 1.12);
        },
        { passive: false }
      );

      let lastTouchX = 0;
      let lastTouchY = 0;
      let lastPinchDist = 0;
      el.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          if (e.touches.length === 1) {
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
            lastPinchDist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
          }
        },
        { passive: false }
      );
      el.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          if (e.touches.length === 1) {
            applyDelta(e.touches[0].clientX - lastTouchX, e.touches[0].clientY - lastTouchY);
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
            const dist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
            if (lastPinchDist > 0) applyZoom(lastPinchDist / dist);
            lastPinchDist = dist;
          }
        },
        { passive: false }
      );
      el.addEventListener("touchend", () => {
        lastPinchDist = 0;
      }, { passive: true });
    }

    function resizePreview() {
      if (!preview.renderer || !preview.camera || !previewHost) return;
      const w = Math.max(previewHost.clientWidth, 2);
      const h = Math.max(previewHost.clientHeight, 2);
      preview.camera.aspect = w / h;
      preview.camera.updateProjectionMatrix();
      preview.renderer.setSize(w, h);
    }

    function fitCameraToMesh(mesh) {
      const box = new THREE.Box3().setFromObject(mesh);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z, 1);
      const dist = maxDim * 2.0;
      preview.camera.near = Math.max(0.01, dist / 200);
      preview.camera.far = dist * 50;
      preview.camera.updateProjectionMatrix();
      preview.initialCameraPos = new THREE.Vector3(0, 0, dist);
      preview.camera.position.copy(preview.initialCameraPos);
      preview.camera.lookAt(0, 0, 0);
    }

    async function ensurePreviewGl() {
      if (preview.renderer && preview.scene) return;
      destroyPreviewGl();
      const host = previewHost;
      const w = Math.max(host.clientWidth, 2);
      const h = Math.max(host.clientHeight, 2);
      preview.scene = new THREE.Scene();
      preview.scene.background = new THREE.Color(0xf0f4ff);
      preview.camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 2000);
      preview.camera.position.set(0, 0, 120);
      preview.camera.lookAt(0, 0, 0);
      preview.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      preview.renderer.setSize(w, h);
      preview.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      host.appendChild(preview.renderer.domElement);

      preview.hemiLight = new THREE.HemisphereLight(0xffffff, 0xdde4f0, 0.25);
      preview.scene.add(preview.hemiLight);
      preview.dirLight = new THREE.DirectionalLight(0xffffff, 1.15);
      preview.scene.add(preview.dirLight.target);
      preview.dirLight.target.position.set(0, 0, 0);
      preview.scene.add(preview.dirLight);
      preview.dirLight.position.set(55, 95, 70);

      setupPreviewDrag();

      function loop() {
        preview._raf = requestAnimationFrame(loop);
        preview.renderer.render(preview.scene, preview.camera);
      }
      loop();

      preview._onResize = resizePreview;
      window.addEventListener("resize", preview._onResize);
      requestAnimationFrame(resizePreview);
    }

    async function loadPreviewFromFirstPending() {
      const first = pendingFiles[0];
      if (!first || !normalizeUploadName(first.file.name)) {
        destroyPreviewGl();
        return;
      }
      await ensurePreviewGl();
      const buf = await first.file.arrayBuffer();
      const loader = new STLLoader();
      const geometry = loader.parse(buf);
      geometry.computeVertexNormals();
      geometry.center();
      disposePreviewMesh();
      const mat = new THREE.MeshStandardMaterial({
        color: 0xa3f958,
        metalness: 0.05,
        roughness: 0.55,
      });
      preview.mesh = new THREE.Mesh(geometry, mat);
      preview.scene.add(preview.mesh);
      fitCameraToMesh(preview.mesh);
    }

    async function uploadStlFile(item) {
      const safeName = slugToStlFilename(item.slug);
      if (!safeName) {
        throw new Error(
          "저장 이름이 올바르지 않습니다. 영문·숫자·._- 만 사용하고 확장자는 생략해도 됩니다: " +
            item.slug
        );
      }
      if (!normalizeUploadName(item.file.name)) {
        throw new Error("원본은 .stl 이고 파일명 규칙을 만족해야 합니다: " + item.file.name);
      }
      const buf = await item.file.arrayBuffer();
      const content = arrayBufferToBase64(buf);

      const res = await fetch(workerEndpoint("/upload"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename: safeName, content }),
      });

      let data;
      try {
        data = await res.json();
      } catch {
        throw new Error("응답을 해석할 수 없습니다 (HTTP " + res.status + ")");
      }

      if (!res.ok || data.success === false) {
        throw new Error(data.error || "업로드 실패 (HTTP " + res.status + ")");
      }
      const url =
        data.url ||
        publicViewerUrlForFilename(data.filename || safeName);
      return { url, filename: data.filename || safeName };
    }

        inp.placeholder = "예: my_product_v2";

        const hint = document.createElement("div");
        hint.className = "slug-hint";
        function syncSlugHint() {

          hint.textContent =
            "→ GitHub: models/" + (fn || "(유효한 이름 필요).stl") + " · 뷰어: ?model=" + (fn ? rawBase : "…");

    function formatBytes(n) {
      if (n < 1024) return n + " B";
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
      return (n / (1024 * 1024)).toFixed(1) + " MB";
    }

    function setLoading(show, text) {
      loadingOverlay.classList.toggle("visible", show);
      loadingOverlay.setAttribute("aria-hidden", show ? "false" : "true");
      if (text) loadingText.textContent = text;
    }

    function showResult(url) {
      lastViewerUrl = url;
      resultUrlEl.href = url;
      resultUrlEl.textContent = url;
      resultPanel.classList.add("visible");
      copyMsg.hidden = true;
      publishStatusEl.hidden = true;
      publishStatusEl.classList.remove(
        "visible",
        "publish-callout--ok",
        "publish-callout--warn",
        "publish-callout--pending"
      );
      publishStatusHead.textContent = "";
      publishStatusBody.textContent = "";
    }

    function modelOnPagesUrl(stlFilename) {
      const base = PUBLIC_VIEWER_BASE.replace(/\/$/, "");
      return base + "/models/" + encodeURIComponent(stlFilename);
    }

    async function isModelReachableOnPages(stlFilename) {
      const url = modelOnPagesUrl(stlFilename) + "?_poll=" + Date.now();
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 12000);
      try {
        let res = await fetch(url, { method: "HEAD", cache: "no-store", signal: ctrl.signal });
        if (res.ok) return true;
        res = await fetch(url, {
          method: "GET",
          cache: "no-store",
          headers: { Range: "bytes=0-31" },
          signal: ctrl.signal,
        });
        return res.ok || res.status === 206;
      } catch {
        return false;
      } finally {
        clearTimeout(tid);
      }
    }

    async function waitForModelsOnPages(stlFilenames) {
      if (!stlFilenames.length) return;
      publishStatusEl.hidden = false;
      publishStatusEl.classList.add("visible", "publish-callout--pending");
      publishStatusEl.classList.remove("publish-callout--ok", "publish-callout--warn");

      const pending = new Set(stlFilenames);
      const total = stlFilenames.length;
      let attempt = 0;
      const maxAttempts = 48;

      while (pending.size > 0 && attempt < maxAttempts) {
        attempt += 1;
        const done = total - pending.size;
        publishStatusHead.textContent = "사이트 반영 확인 중";
        publishStatusBody.textContent =
          "GitHub Pages에 STL이 보이는지 확인하고 있습니다. (" +
          done +
          "/" +
          total +
          " 파일 확인됨 · 시도 " +
          attempt +
          "/" +
          maxAttempts +
          ")\n\n최대 약 1~2분 걸릴 수 있습니다. 완료되면 여기 초록색으로 바뀝니다.";

        for (const name of [...pending]) {
          if (await isModelReachableOnPages(name)) pending.delete(name);
        }

        if (pending.size === 0) {
          publishStatusEl.classList.remove("publish-callout--pending");
          publishStatusEl.classList.add("publish-callout--ok");
          publishStatusHead.textContent = "반영 완료";
          publishStatusBody.textContent =
            "위 뷰어 링크로 모델을 열 수 있는 상태로 보입니다. 화면이 비면 링크를 한 번 더 누르거나 새로고침해 보세요.";
          return;
        }

        const delay = Math.min(600 + attempt * 100, 2800);
        await new Promise((r) => setTimeout(r, delay));
      }

      publishStatusEl.classList.remove("publish-callout--pending");
      publishStatusEl.classList.add("publish-callout--warn");
      const left = [...pending].join(", ");
      publishStatusHead.textContent = "아직 확인되지 않음";
      publishStatusBody.textContent =
        "다음 파일을 Pages에서 아직 찾지 못했습니다: " +
        left +
        "\n\nGitHub·Pages 배포 지연 또는 캐시일 수 있습니다. 잠시 후 뷰어 링크를 다시 열어 보세요.";
    }

    function addFilesFromList(fileList) {
      const incoming = Array.from(fileList || []).filter((f) =>
        f.name.toLowerCase().endsWith(".stl")
      );
      if (incoming.length === 0 && fileList && fileList.length > 0) {
        showError("STL 파일(.stl)만 추가할 수 있습니다.");
        return;
      }
      clearError();
      const names = new Set(pendingFiles.map((x) => x.file.name));
      for (const f of incoming) {
        if (names.has(f.name)) continue;
        const normalized = normalizeUploadName(f.name);
        if (!normalized) {
          showError(
            "원본 파일명 규칙에 맞지 않습니다(영문·숫자·._- 만): " + f.name + " — 다른 이름으로 저장한 뒤 다시 추가하세요."
          );
          continue;
        }
        const slug = normalized.slice(0, -4);
        pendingFiles.push({ file: f, slug });
        names.add(f.name);
      }
      renderPending();
    }

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        fileInput.click();
      }
    });
    ["dragenter", "dragover"].forEach((ev) => {
      dropZone.addEventListener(ev, (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
    });
    dropZone.addEventListener("dragleave", (e) => {
      if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove("dragover");
    });
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      addFilesFromList(e.dataTransfer && e.dataTransfer.files);
    });
    fileInput.addEventListener("change", () => {
      addFilesFromList(fileInput.files);
      fileInput.value = "";
    });

    btnClearPending.addEventListener("click", () => {
      pendingFiles = [];
      renderPending();
    });

    btnUpload.addEventListener("click", async () => {
      clearError();
      if (pendingFiles.length === 0) return;

      const files = pendingFiles.slice();
      const resolvedNames = [];
      for (const item of files) {
        const fn = slugToStlFilename(item.slug);
        if (!fn) {
          showError("저장 이름이 올바르지 않습니다(영문·숫자·._- 만): " + item.slug);
          return;
        }
        resolvedNames.push(fn);
      }
      if (new Set(resolvedNames).size !== resolvedNames.length) {
        showError("대기 목록에서 저장 이름(확장자 제외 기준)이 서로 겹칩니다.");
        return;
      }

      let lastUrl = "";
      try {
        for (let i = 0; i < files.length; i++) {
          setLoading(true, "업로드 중… (" + (i + 1) + "/" + files.length + ")");
          const out = await uploadStlFile(files[i]);
          lastUrl = out.url;
        }
        showResult(lastUrl);
        pendingFiles = [];
        renderPending();
        await refreshRemoteList();
        waitForModelsOnPages(resolvedNames).catch((e) => console.error(e));
      } catch (e) {
        console.error(e);
        showError(e.message || String(e));
      } finally {
        setLoading(false);
      }
    });

    btnCopyUrl.addEventListener("click", async () => {
      if (!lastViewerUrl) return;
      try {
        await navigator.clipboard.writeText(lastViewerUrl);
        copyMsg.hidden = false;
        setTimeout(() => {
          copyMsg.hidden = true;

      }
    });

    btnKakaoShare.addEventListener("click", async () => {
      if (!lastViewerUrl) return;
      const title = "3D 모델 미리보기";
      const text = "아래 링크에서 3D 모델을 확인할 수 있습니다.\n" + lastViewerUrl;
      try {
        if (navigator.share) {
          await navigator.share({
            title,
            text: "3D 모델 미리보기 링크입니다.",
            url: lastViewerUrl,
          });
          return;
        }
      } catch (e) {
        if (e.name === "AbortError") return;
      }
      try {
        await navigator.clipboard.writeText(text);
        alert("안내 문구와 링크를 클립보드에 복사했습니다. 카카오톡 채팅창에 붙여넣기 하세요.");
      } catch {

      }
    });

    async function deleteRemoteFile(filename) {
      if (!confirm("정말 삭제하시겠습니까?")) return;
      try {
        const res = await fetch(workerEndpoint("/delete"), {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ filename }),
        });
        let data;
        try {
          data = await res.json();
        } catch {
          throw new Error("응답 해석 실패 (HTTP " + res.status + ")");
        }
        if (!res.ok || data.success === false) {
          throw new Error(data.error || "삭제 실패");
        }
        await refreshRemoteList();
      } catch (e) {
        showError(e.message || String(e));
      }
    }

    async function refreshRemoteList() {
      remoteMeta.textContent = "";
      remoteTbody.innerHTML =
        '<tr class="empty-row"><td colspan="3">불러오는 중…</td></tr>';
      try {
        clearError();
        const res = await fetch(workerEndpoint("/list"), {
          method: "GET",
        });
        let data;
        try {
          data = await res.json();
        } catch {
          throw new Error("목록 응답을 해석할 수 없습니다 (HTTP " + res.status + ")");
        }

        if (!res.ok && data.success === false) {
          throw new Error(data.error || "목록 조회 실패 (HTTP " + res.status + ")");
        }
        if (!res.ok) {
          throw new Error(data.error || "HTTP " + res.status);
        }

        if (data.success === false && data.error) {
          throw new Error(data.error);
        }

        const files = Array.isArray(data.files) ? data.files : [];
        remoteMeta.textContent = files.length + "개";
        if (files.length === 0) {
          remoteTbody.innerHTML =
            '<tr class="empty-row"><td colspan="3">models/ 에 STL이 없습니다.</td></tr>';
          return;
        }

        remoteTbody.innerHTML = "";
        for (const item of files) {
          const name = item.filename || "";
          const url =
            item.url || publicViewerUrlForFilename(name);
          const tr = document.createElement("tr");
          const tdName = document.createElement("td");
          tdName.dataset.label = "파일";
          tdName.textContent = name;
          const tdLink = document.createElement("td");
          tdLink.dataset.label = "뷰어 링크";
          const a = document.createElement("a");
          a.href = url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = url;
          tdLink.appendChild(a);
          const tdAct = document.createElement("td");
          tdAct.dataset.label = "작업";
          tdAct.className = "remote-cell-actions";
          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "btn btn-mini btn-danger btn-delete-remote";
          delBtn.textContent = "삭제";
          delBtn.addEventListener("click", () => deleteRemoteFile(name));
          tdAct.appendChild(delBtn);
          tr.appendChild(tdName);
          tr.appendChild(tdLink);
          tr.appendChild(tdAct);
          remoteTbody.appendChild(tr);
        }
      } catch (e) {
        remoteTbody.innerHTML =
          '<tr class="empty-row"><td colspan="3">목록을 불러오지 못했습니다.</td></tr>';
        remoteMeta.textContent = "";
        showError(e.message || String(e));
      }
    }

    btnRefreshList.addEventListener("click", () =>
      refreshRemoteList().catch(() => {})
    );

    refreshRemoteList().catch(() => {});
  </script>
</body>
</html>
